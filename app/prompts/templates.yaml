clarify_question:
  description: "澄清問題含義"
  default: "v1"
  versions:
    v1: >-
      你是一位專業的私人助理，請根據以下問題提出幾個可能方向澄清問題含義。

      問題：{question}

      你的任務：
      1. 分析問題的核心意圖，可能的歧義點（如技術術語、情境、範圍）。
      2. 提出 3-4 個具體的澄清方向，每個方向用 1 句話描述，並標記為 [選項1]、[選項2] 等。
      3. 提供一個「其他」選項，讓用戶輸入自己的想法。
      4. 最後建議一個你認為最可能的澄清版本（標記為【推薦澄清】）。

      回應格式（嚴格遵守）：
      ```
      為了更精準回答，我需要確認你的問題意圖。以下是幾個可能的方向：

      [選項1] 你想了解 RAG 在租車司機流失預測的應用嗎？
      [選項2] RAG 中整合因果推論來提升準確性嗎？
      [選項3] 你希望探討 RAG 的 prompt 工程最佳實務嗎？
      [選項4] 其他特定情境，如時間序列資料的 RAG 處理嗎？

      [其他] 請進一步描述你的問題：____________
      ```

      保持回應專業、簡潔。

grade_document:
  description: "文件相關性審查"
  default: "v1"
  versions:
    v1: >-
      你是一位嚴格的審查員。請判斷以下檢索到的筆記內容是否與用戶問題相關。

      問題：{question}
      筆記內容：{context}

      請只回答 "yes" 或 "no"。

    v2: >-
      你是資料科學專家。以下筆記是否能回答此因果推論問題？

      問題：{question}
      筆記：{context[:300]}...

      只答 yes/no，不解釋。

generate:
  description: "生成最終回答"
  default: "v1"
  versions:
    v1: >-
      你是一位專業的私人助理。請根據以下筆記回答問題。

      筆記內容：{context}
      用戶問題：{question}

      助理回答：

    v2: >-
      作為租車業資料科學家，用以下筆記精確回答：

      📄 筆記：{context}
      ❓ 問題：{question}

      💡 回答（引用來源）：

transform_query:
  description: "轉換查詢關鍵字"
  default: "v2"
  versions:
    v1: >-
      請根據原始問題：{question}
      改寫成一個更適合在向量資料庫搜尋的關鍵字。
      只回傳改寫後的文字。
    v2: >-
      你是一位資料科學專家，擅長優化向量資料庫搜尋。

      原始問題：{question}

      任務：將上述問題改寫成**一個完整、自然的搜尋查詢**，讓向量資料庫能找到最相關的文件。

      改寫原則：
      1. 保持原問題的核心意圖
      2. 使用具體的名詞、技術術語
      3. 形成**完整句子或短語**
      4. 適合向量 embedding 搜尋

      只回傳改寫後的搜尋查詢，不要其他解釋。

      範例：
      原始：RAG在時間序列怎麼用
      改寫：RAG在租車平台時間序列預測的應用實作
