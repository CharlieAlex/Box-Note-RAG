hyde:
  description: "HyDE - 假說文件嵌入"
  default: "v1"
  versions:
    v1: >-
      ## 任務

      你是一位知識豐富的助理。請根據以下問題，撰寫一段可能的回答，
      即使你不確定也請盡量推測。這段文字將用於改善搜尋品質。

      ## 問題

      {question}

      ## 回應格式

      請直接回答，不要加任何前綴或解釋。

check_clarity:
  description: "檢查問題是否足夠清楚"
  default: "v1"
  versions:
    v1: >-
      ## 任務

      你是一位專業的助理。請分析以下用戶提出的問題，判斷其意圖是否足夠清晰，以便直接進行資訊檢索。

      ## 判斷標準

      1. 如果問題明確，即有清晰的查詢目標、特定的情境、明確唯一的答案，請回答 "yes"。
      2. 如果問題過於模糊、存在明顯歧義，或者需要更多上下文才能開始有效搜尋，請回答 "no"。

      ## 問題

      {question}

      ## 回應格式

      請直接判斷，不需要解釋。

clarify_question:
  description: "澄清問題含義"
  default: "v1"
  versions:
    v1: >-
      ## 任務

      你是一位專業的私人助理，請根據以下提供的**原始問題**提出幾個可能方向澄清問題含義。

      ## 你的任務

      1. 分析問題的核心意圖，可能的歧義點（如技術術語、情境、範圍）。
      2. 提出 3-4 個具體的澄清方向，每個方向用 1 句話描述，並標記為 [選項1]、[選項2] 等。
      3. 提供一個「其他」選項，讓用戶輸入自己的想法。
      4. 最後建議一個你認為最可能的澄清版本（標記為【推薦澄清】）。

      ## 回應格式（嚴格遵守）：

      ```
      你原始的問題是: <原始問題>

      為了更精準回答，我需要確認你的問題意圖。以下是幾個可能的方向：

      [選項1] <第一種澄清方向>
      [選項2] <第二種澄清方向>
      [選項3] <第三種澄清方向>
      [選項4] <第四種澄清方向>

      [其他] 請進一步描述你的問題：____________
      ```

      ## 原始問題

      {question}

      ## 回應格式

      保持回應專業、簡潔。

refine_question:
  description: "根據澄清後的互動，重新生成結構化問題"
  default: "v1"
  versions:
    v1: >-
      ## 任務

      你是一位精準的對話總結專家。你的任務是將澄清用戶意圖的問答進行總結，產出一個語意清晰、目標明確且具備完整上下文的新問題。

      ## 規則

      1. **語意提取**：如果用戶輸入數字或是選項，請根據選項內容整理成一個完整的問題。
      2. **補完上下文**：修正原問題中模糊的術語、縮小執行範圍，並補充必要的背景資訊。
      3. **排除雜訊**：移除對話中的贅字，只保留純粹的問題描述。

      ## 問答歷史

      {question}

      ## 回應格式

      請直接回答，不要加任何前綴或解釋。

grade_document:
  description: "文件相關性審查"
  default: "v1"
  versions:
    v1: >-
      ## 任務

      你是一位嚴格的審查員。請判斷以下檢索到的筆記內容是否與用戶問題相關。

      ## 用戶問題

      {question}

      ## 筆記內容

      {context}

      ## 回應格式

      請只回答 "yes" 或 "no"。

generate:
  description: "生成最終回答"
  default: "v1"
  versions:
    v1: >-
      ## 任務

      你是一位專業的私人助理。請根據以下筆記回答問題。

      ## 筆記內容

      {context}

      ## 用戶問題

      {question}

    v2: >-
      作為租車業資料科學家，用以下筆記精確回答：

      📄 筆記：{context}
      ❓ 問題：{question}

      💡 回答（引用來源）：

transform_query:
  description: "轉換查詢關鍵字"
  default: "v2"
  versions:
    v1: >-
      請根據原始問題：{question}
      改寫成一個更適合在向量資料庫搜尋的關鍵字。
      只回傳改寫後的文字。
    v2: >-
      ## 任務

      你是一位資料科學專家，擅長優化向量資料庫搜尋。
      請將以下提供的原始問題改寫成**一個完整、自然的搜尋查詢**，讓向量資料庫能找到最相關的文件。

      ## 改寫原則：

      1. 保持原問題的核心意圖
      2. 使用具體的名詞、技術術語
      3. 形成**完整句子或短語**
      4. 適合向量 embedding 搜尋

      ## 原始問題

      {question}

      ## 回應格式

      只回傳改寫後的搜尋查詢，不要其他解釋。
